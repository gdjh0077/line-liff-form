<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲群帳號管理後台</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #1a1c23; color: #e2e8f0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #242631; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #4ade80; margin-top: 0; }
        .user-info { font-size: 14px; background: #2d3142; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; color: #a0aec0; }
        .role-card { background: #2d3142; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #4a5568; cursor: pointer; transition: 0.2s; }
        .role-card:hover { border-color: #4ade80; background: #343a52; }
        .btn { width: 100%; background-color: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background-color: #059669; }
        .btn-secondary { background-color: #4b5563; }
        .btn-secondary:hover { background-color: #374151; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #cbd5e1; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; background-color: #1a1c23; border: 1px solid #4a5568; border-radius: 6px; color: white; font-size: 16px; }
        input:focus, select:focus { border-color: #10b981; outline: none; }
        .hidden { display: none; }
        .loading { text-align: center; color: #10b981; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 角色管理後台</h2>
    <div id="userInfo" class="user-info">LINE 暱稱: 載入中...</div>

    <div id="loadingStatus" class="loading">正在讀取您的角色清單...</div>

    <div id="listMode" class="hidden">
        <p style="font-size: 14px; color: #a0aec0;">您目前已绑定的角色（點擊可直接修改）：</p>
        <div id="roleList"></div>
        <button class="btn" onclick="showFormMode('', '', '')">➕ 綁定全新分身</button>
    </div>

    <div id="formMode" class="hidden">
        <h3 id="formTitle" style="color: #10b981; margin-top: 0;">新增角色</h3>
        
        <div class="form-group">
            <label>遊戲內名稱 (Game Name)</label>
            <input type="text" id="gameName" placeholder="請輸入遊戲名字">
        </div>
        
        <div class="form-group">
            <label>主要職業 (Job / Class)</label>
            <select id="job">
                <option value="天工">天工</option>
                <option value="司倉">司倉</option>
                <option value="神射手">神射手</option>
                <option value="聖騎士">聖騎士</option>
            </select>
        </div>
        
        <button class="btn" id="submitBtn" onclick="submitData()">確認送出</button>
        <button class="btn btn-secondary" onclick="showListMode()">返回清單</button>
    </div>
</div>

<script>
    // 💡 務必換成你 Render 的主網址
    const BACKEND_URL = 'https://my-linebot-backend.onrender.com'; 
    
    let profileData = { userId: '', displayName: '' };
    let myRoles = [];
    let editingOldName = ''; // 用來紀錄正在修改的角色舊名字

    async function initLIFF() {
        try {
            await liff.init({ liffId: "2010148079-embgIxoY" }); // 保持你的 LIFF ID
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const profile = await liff.getProfile();
            profileData.userId = profile.userId;
            profileData.displayName = profile.displayName;
            
            document.getElementById('userInfo').innerText = `LINE 暱稱: ${profile.displayName}`;
            
            // 載入完成，去後端拉取角色清單
            await fetchUserRoles();
        } catch (error) {
            alert('LIFF 初始化失敗: ' + error);
        }
    }

    async function fetchUserRoles() {
        try {
            const res = await fetch(`${BACKEND_URL}/get-user-roles`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: profileData.userId })
            });
            const data = await res.json();
            document.getElementById('loadingStatus').classList.add('hidden');
            
            if (data.status === 'success') {
                myRoles = data.roles;
                if (myRoles.length === 0) {
                    // 新用戶直接進表單模式
                    showFormMode('', '', '');
                } else {
                    // 舊用戶顯示清單模式
                    showListMode();
                }
            } else {
                alert('讀取角色失敗: ' + data.message);
            }
        } catch (e) {
            alert('連線後端失敗: ' + e);
        }
    }

    function showListMode() {
        document.getElementById('formMode').classList.add('hidden');
        document.getElementById('listMode').classList.remove('hidden');
        
        const listDiv = document.getElementById('roleList');
        listDiv.innerHTML = '';
        
        myRoles.forEach(role => {
            const card = document.createElement('div');
            card.className = 'role-card';
            card.innerHTML = `<div><strong>${role.gameName}</strong><br><span style="font-size:12px; color:#a0aec0;">職業: ${role.job}</span></div><span style="color:#10b981; font-size:14px;">修改 ✏️</span>`;
            card.onclick = () => showFormMode(role.gameName, role.job, role.gameName);
            listDiv.appendChild(card);
        });
    }

    function showFormMode(gameName, job, oldName) {
        document.getElementById('listMode').classList.add('hidden');
        document.getElementById('formMode').classList.remove('hidden');
        
        editingOldName = oldName; // 如果是空字串代表是全新新增；有值代表是修改
        document.getElementById('formTitle').innerText = oldName ? `✏️ 修改角色 [${oldName}]` : '➕ 新增全新角色';
        document.getElementById('gameName').value = gameName;
        if(job) document.getElementById('job').value = job;
    }

    async function submitData() {
        const gameName = document.getElementById('gameName').value.trim();
        const job = document.getElementById('job').value;
        
        if (!gameName) {
            alert('請填寫遊戲內名稱！');
            return;
        }
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = '處理中...';
        submitBtn.disabled = true;

        try {
            const response = await fetch(`${BACKEND_URL}/submit-form`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: profileData.userId,
                    displayName: profileData.displayName,
                    gameName: gameName,
                    job: job,
                    oldGameName: editingOldName // 告訴後端這是從哪隻舊角色改過來的
                })
            });

            const result = await response.json();
            alert(result.message);

            if (response.ok) {
                // 重新刷新清單
                document.getElementById('loadingStatus').classList.remove('hidden');
                document.getElementById('listMode').classList.add('hidden');
                document.getElementById('formMode').classList.add('hidden');
                await fetchUserRoles();
            }
        } catch (error) {
            alert('連線失敗: ' + error);
        } finally {
            submitBtn.innerText = '確認送出';
            submitBtn.disabled = false;
        }
    }

    window.onload = initLIFF;
</script>
</body>
</html>
